<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0f1a2d"/>
  
  <!-- Title -->
  <text x="200" y="20" fill="#e8edf5" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">DIAPHRAGM &amp; CAPSULE GAUGES</text>
  
  <!-- Divider horizontal -->
  <line x1="20" y1="100" x2="380" y2="100" stroke="#1a2d4a" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- ===== TOP HALF: DIAPHRAGM GAUGE ===== -->
  <text x="100" y="36" fill="#00b4ff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">Diaphragm Gauge</text>
  
  <!-- Housing top -->
  <rect x="40" y="42" width="120" height="50" rx="4" fill="none" stroke="#e8edf5" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Diaphragm membrane - flat (at rest, shown as dashed) -->
  <line x1="42" y1="65" x2="158" y2="65" stroke="#e8edf5" stroke-width="1" stroke-dasharray="5,3" opacity="0.3"/>
  
  <!-- Diaphragm bulging upward under pressure -->
  <path d="M 42 75 Q 100 40 158 75" fill="none" stroke="#00b4ff" stroke-width="2.5"/>
  
  <!-- Pressure from below arrows -->
  <polygon points="70,88 65,96 75,96" fill="#F5A800"/>
  <polygon points="100,88 95,96 105,96" fill="#F5A800"/>
  <polygon points="130,88 125,96 135,96" fill="#F5A800"/>
  <text x="100" y="96" fill="#F5A800" font-family="monospace" font-size="6" text-anchor="middle">P ↑</text>
  
  <!-- Deflection annotation -->
  <line x1="100" y1="65" x2="100" y2="52" stroke="#e8edf5" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
  <text x="115" y="54" fill="#e8edf5" font-family="monospace" font-size="6" opacity="0.7">deflection</text>
  
  <!-- Label: Pressure inlet -->
  <rect x="75" y="82" width="50" height="12" rx="2" fill="none" stroke="#F5A800" stroke-width="1" opacity="0.6"/>
  <text x="100" y="91" fill="#F5A800" font-family="monospace" font-size="6" text-anchor="middle">pressure</text>
  
  <!-- ===== BOTTOM HALF: CAPSULE GAUGE ===== -->
  <text x="300" y="116" fill="#00b4ff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">Capsule Gauge</text>
  
  <!-- Housing bottom -->
  <rect x="240" y="122" width="120" height="70" rx="4" fill="none" stroke="#e8edf5" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Top diaphragm (at rest) -->
  <line x1="242" y1="145" x2="358" y2="145" stroke="#e8edf5" stroke-width="1" stroke-dasharray="5,3" opacity="0.3"/>
  
  <!-- Bottom diaphragm (at rest) -->
  <line x1="242" y1="170" x2="358" y2="170" stroke="#e8edf5" stroke-width="1" stroke-dasharray="5,3" opacity="0.3"/>
  
  <!-- Two diaphragms welded at edges, expanding outward under pressure -->
  <!-- Top diaphragm bulging upward -->
  <path d="M 242 145 Q 300 120 358 145" fill="none" stroke="#00b4ff" stroke-width="2"/>
  <!-- Bottom diaphragm bulging downward -->
  <path d="M 242 170 Q 300 195 358 170" fill="none" stroke="#00b4ff" stroke-width="2"/>
  
  <!-- Weld points -->
  <circle cx="242" cy="157" r="3" fill="#F5A800"/>
  <circle cx="358" cy="157" r="3" fill="#F5A800"/>
  
  <!-- Internal pressure arrows between diaphragms -->
  <polygon points="290,160 285,153 295,153" fill="#F5A800"/>
  <polygon points="310,160 305,153 315,153" fill="#F5A800"/>
  <polygon points="275,160 270,153 280,153" fill="#F5A800"/>
  
  <!-- Pressure inlet from side -->
  <rect x="290" y="156" width="20" height="8" rx="1" fill="none" stroke="#F5A800" stroke-width="0.8"/>
  <text x="300" y="163" fill="#F5A800" font-family="monospace" font-size="5" text-anchor="middle">P</text>
  
  <!-- Expansion annotation -->
  <line x1="300" y1="145" x2="300" y2="135" stroke="#e8edf5" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
  <text x="315" y="138" fill="#e8edf5" font-family="monospace" font-size="6" opacity="0.7">expansion</text>
  
  <line x1="300" y1="170" x2="300" y2="180" stroke="#e8edf5" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
  
  <!-- Side labels -->
  <text x="232" y="132" fill="#e8edf5" font-family="monospace" font-size="6" opacity="0.6">welded</text>
  <text x="345" y="132" fill="#e8edf5" font-family="monospace" font-size="6" opacity="0.6">welded</text>
  
  <!-- "Two diaphragms" label -->
  <text x="300" y="188" fill="#e8edf5" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.7">two diaphragms welded at edges</text>
</svg>