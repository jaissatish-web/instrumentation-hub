<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150">
  <rect width="400" height="150" fill="#0f1a2d"/>
  
  <!-- Title -->
  <text x="200" y="18" fill="#e8edf5" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">4-20 mA CURRENT LOOP</text>
  
  <!-- ===== POWER SUPPLY (left) ===== -->
  <circle cx="55" cy="75" r="22" fill="none" stroke="#F5A800" stroke-width="2"/>
  <circle cx="55" cy="75" r="20" fill="none" stroke="#F5A800" stroke-width="1" opacity="0.5"/>
  <!-- +/- terminals -->
  <text x="55" y="67" fill="#F5A800" font-family="monospace" font-size="7" text-anchor="middle">+</text>
  <text x="55" y="93" fill="#F5A800" font-family="monospace" font-size="7" text-anchor="middle">−</text>
  <text x="55" y="49" fill="#F5A800" font-family="monospace" font-size="7" text-anchor="middle">24V</text>
  <text x="55" y="106" fill="#F5A800" font-family="monospace" font-size="6" text-anchor="middle">DC</text>
  
  <!-- ===== TRANSMITTER (middle) ===== -->
  <rect x="140" y="52" width="120" height="46" rx="4" fill="none" stroke="#00b4ff" stroke-width="2"/>
  <rect x="142" y="54" width="116" height="42" rx="3" fill="none" stroke="#00b4ff" stroke-width="0.5" opacity="0.3"/>
  <text x="200" y="73" fill="#00b4ff" font-family="monospace" font-size="8" text-anchor="middle" font-weight="bold">Pressure</text>
  <text x="200" y="86" fill="#00b4ff" font-family="monospace" font-size="8" text-anchor="middle" font-weight="bold">Transmitter</text>
  
  <!-- ===== DCS/PLC (right) ===== -->
  <rect x="310" y="52" width="70" height="46" rx="4" fill="none" stroke="#e8edf5" stroke-width="2"/>
  <rect x="312" y="54" width="66" height="42" rx="3" fill="none" stroke="#e8edf5" stroke-width="0.5" opacity="0.3"/>
  <text x="345" y="70" fill="#e8edf5" font-family="monospace" font-size="7" text-anchor="middle">DCS/</text>
  <text x="345" y="83" fill="#e8edf5" font-family="monospace" font-size="7" text-anchor="middle">PLC</text>
  
  <!-- ===== WIRING LOOP ===== -->
  <!-- Wire from +24V out to Transmitter +in (TOP path: +24V supply) -->
  <line x1="77" y1="65" x2="140" y2="65" stroke="#e8edf5" stroke-width="1.5"/>
  
  <!-- Wire from Transmitter +out to DCS/PLC +in (TOP path) -->
  <line x1="260" y1="65" x2="310" y2="65" stroke="#e8edf5" stroke-width="1.5"/>
  
  <!-- Wire from DCS/PLC -out back to Transmitter -in (BOTTOM path: return) -->
  <line x1="310" y1="87" x2="260" y2="87" stroke="#e8edf5" stroke-width="1.5"/>
  
  <!-- Wire from Transmitter -out back to Power Supply - (BOTTOM path) -->
  <line x1="140" y1="87" x2="77" y2="87" stroke="#e8edf5" stroke-width="1.5"/>
  
  <!-- ===== WIRE LABELS ===== -->
  <text x="108" y="59" fill="#F5A800" font-family="monospace" font-size="7" text-anchor="middle">+24V</text>
  <text x="108" y="101" fill="#e8edf5" font-family="monospace" font-size="7" text-anchor="middle">Return</text>
  
  <!-- ===== CURRENT FLOW ARROWS (on top wire) ===== -->
  <polygon points="115,62 108,58 108,66" fill="#00b4ff"/>
  <polygon points="160,62 153,58 153,66" fill="#00b4ff"/>
  <polygon points="230,62 223,58 223,66" fill="#00b4ff"/>
  <polygon points="290,62 283,58 283,66" fill="#00b4ff"/>
  
  <!-- 4-20 mA direction label -->
  <text x="200" y="42" fill="#00b4ff" font-family="monospace" font-size="8" text-anchor="middle">4-20 mA →</text>
  
  <!-- Small loop indicator: arrow circling the loop -->
  <path d="M 390 75 A 15 15 0 0 1 385 95 L 380 95" 
        fill="none" stroke="#e8edf5" stroke-width="0.8" opacity="0.3"/>
  <polygon points="378,95 383,92 383,98" fill="#e8edf5" opacity="0.3"/>
  
  <!-- Legend at bottom -->
  <text x="200" y="132" fill="#e8edf5" font-family="monospace" font-size="6" text-anchor="middle" opacity="0.45">Signal current varies 4-20 mA proportional to pressure</text>
  
  <!-- Terminal dots -->
  <circle cx="140" cy="65" r="2.5" fill="#e8edf5"/>
  <circle cx="260" cy="65" r="2.5" fill="#e8edf5"/>
  <circle cx="310" cy="65" r="2.5" fill="#e8edf5"/>
  <circle cx="140" cy="87" r="2.5" fill="#e8edf5"/>
  <circle cx="260" cy="87" r="2.5" fill="#e8edf5"/>
  <circle cx="310" cy="87" r="2.5" fill="#e8edf5"/>
</svg>