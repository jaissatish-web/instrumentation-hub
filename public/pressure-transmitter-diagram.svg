<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="#1a2744" />
      <stop offset="100%" stopColor="#0f1a2d" />
    </linearGradient>
    <linearGradient id="diaphragmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="#312e81" />
      <stop offset="100%" stopColor="#1e1b4b" />
    </linearGradient>
  </defs>
  
  {/* Process connection */}
  <path d="M180 20 L180 60" stroke="#00b4ff" strokeWidth="3" />
  <rect x="170" y="60" width="20" height="40" fill="#374151" rx="2" />
  
  {/* Transmitter body */}
  <rect x="120" y="100" width="160" height="100" rx="8" fill="url(#bodyGrad)" stroke="#00b4ff" strokeWidth="2" />
  <text x="200" y="125" textAnchor="middle" fill="#e8edf5" fontSize="12" fontWeight="600" fontFamily="Space Grotesk, sans-serif">Process Seal</text>
  <text x="200" y="155" textAnchor="middle" fill="#8a9bb5" fontSize="10" fontFamily="JetBrains Mono, monospace">316 SS Wetted Parts</text>
  
  {/* Diaphragm */}
  <ellipse cx="200" cy="175" rx="40" ry="25" fill="url(#diaphragmGrad)" stroke="#00b4ff" strokeWidth="1.5" />
  <text x="200" y="180" textAnchor="middle" fill="#e8edf5" fontSize="9" fontFamily="JetBrains Mono, monospace">Silicon Diaphragm</text>
  
  {/* Electronics housing */}
  <rect x="140" y="200" width="120" height="40" rx="4" fill="#131d2e" stroke="#00b4ff" strokeWidth="1" />
  <text x="200" y="220" textAnchor="middle" fill="#00b4ff" fontSize="9" fontFamily="JetBrains Mono, monospace">Electronics + 4–20 mA</text>
  
  {/* Terminal box */}
  <rect x="200" y="250" width="80" height="30" fill="#374151" stroke="#00b4ff" strokeWidth="1" />
  <text x="240" y="268" textAnchor="middle" fill="#e8edf5" fontSize="8" fontFamily="JetBrains Mono, monospace">M20 Terminal</text>
  
  {/* Arrows */}
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00b4ff" />
    </marker>
  </defs>
  
  <line x1="250" y1="175" x2="280" y2="175" stroke="#00b4ff" strokeWidth="1" markerEnd="url(#arrowhead)" />
  <text x="285" y="178" fill="#e8edf5" fontSize="8" fontFamily="JetBrains Mono, monospace">Pressure Applied</text>
  
  <line x1="280" y1="220" x2="340" y2="220" stroke="#ff6b35" strokeWidth="2" />
  <text x="345" y="224" fill="#ff6b35" fontSize="9" fontFamily="JetBrains Mono, monospace">4–20 mA HART</text>
</svg>