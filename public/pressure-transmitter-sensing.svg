<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#0f1a2d"/>
  
  <!-- Title -->
  <text x="200" y="20" fill="#e8edf5" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">PRESSURE SENSING PRINCIPLES</text>
  
  <!-- Divider vertical -->
  <line x1="200" y1="28" x2="200" y2="240" stroke="#1a2d4a" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- ===== LEFT: PIEZORESISTIVE (Wheatstone Bridge) ===== -->
  <text x="100" y="40" fill="#00b4ff" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">Piezoresistive</text>
  <text x="100" y="52" fill="#00b4ff" font-family="monospace" font-size="8" text-anchor="middle">(Wheatstone Bridge)</text>
  
  <!-- Silicon diaphragm outline -->
  <rect x="30" y="62" width="140" height="100" rx="6" fill="none" stroke="#e8edf5" stroke-width="1.5" opacity="0.35"/>
  <text x="100" y="58" fill="#e8edf5" font-family="monospace" font-size="6" text-anchor="middle" opacity="0.5">silicon diaphragm</text>
  
  <!-- Wheatstone bridge diamond -->
  <!-- Resistor R1 (top) -->
  <rect x="88" y="72" width="24" height="8" rx="2" fill="none" stroke="#F5A800" stroke-width="1.5"/>
  <text x="100" y="78" fill="#F5A800" font-family="monospace" font-size="6" text-anchor="middle">R1</text>
  
  <!-- Resistor R2 (right) -->
  <rect x="128" y="108" width="8" height="24" rx="2" fill="none" stroke="#F5A800" stroke-width="1.5"/>
  <text x="132" y="127" fill="#F5A800" font-family="monospace" font-size="6" text-anchor="middle">R2</text>
  
  <!-- Resistor R3 (bottom) -->
  <rect x="88" y="146" width="24" height="8" rx="2" fill="none" stroke="#F5A800" stroke-width="1.5"/>
  <text x="100" y="152" fill="#F5A800" font-family="monospace" font-size="6" text-anchor="middle">R3</text>
  
  <!-- Resistor R4 (left) -->
  <rect x="64" y="108" width="8" height="24" rx="2" fill="none" stroke="#F5A800" stroke-width="1.5"/>
  <text x="63" y="127" fill="#F5A800" font-family="monospace" font-size="6" text-anchor="middle">R4</text>
  
  <!-- Connecting lines for diamond -->
  <line x1="100" y1="80" x2="132" y2="108" stroke="#e8edf5" stroke-width="1.2"/>
  <line x1="132" y1="132" x2="100" y2="146" stroke="#e8edf5" stroke-width="1.2"/>
  <line x1="100" y1="154" x2="68" y2="132" stroke="#e8edf5" stroke-width="1.2"/>
  <line x1="68" y1="108" x2="100" y2="80" stroke="#e8edf5" stroke-width="1.2"/>
  
  <!-- Excitation Vb (top) -->
  <line x1="100" y1="72" x2="100" y2="63" stroke="#00b4ff" stroke-width="1.5"/>
  <text x="110" y="67" fill="#00b4ff" font-family="monospace" font-size="7">+Vb</text>
  
  <!-- Ground (bottom) -->
  <line x1="100" y1="154" x2="100" y2="162" stroke="#00b4ff" stroke-width="1.5"/>
  <line x1="94" y1="162" x2="106" y2="162" stroke="#00b4ff" stroke-width="1.5"/>
  <line x1="96" y1="165" x2="104" y2="165" stroke="#00b4ff" stroke-width="1.5"/>
  
  <!-- Vout left -->
  <line x1="64" y1="120" x2="50" y2="120" stroke="#F5A800" stroke-width="1.5"/>
  <line x1="50" y1="120" x2="50" y2="130" stroke="#F5A800" stroke-width="1.5"/>
  <polygon points="50,130 45,120 55,120" fill="#F5A800" transform="rotate(90,50,130)"/>
  <text x="42" y="140" fill="#F5A800" font-family="monospace" font-size="7" text-anchor="end">Vout</text>
  
  <!-- Vout right -->
  <line x1="136" y1="120" x2="148" y2="120" stroke="#F5A800" stroke-width="1.5"/>
  <line x1="148" y1="120" x2="148" y2="130" stroke="#F5A800" stroke-width="1.5"/>
  <polygon points="148,130 143,120 153,120" fill="#F5A800" transform="rotate(90,148,130)"/>
  <text x="158" y="140" fill="#F5A800" font-family="monospace" font-size="7">Vout</text>
  
  <!-- Pressure arrow on diaphragm -->
  <polygon points="100,175 95,185 105,185" fill="#00b4ff"/>
  <line x1="100" y1="165" x2="100" y2="175" stroke="#00b4ff" stroke-width="1.5"/>
  <text x="115" y="182" fill="#00b4ff" font-family="monospace" font-size="7">P</text>
  
  <!-- ===== RIGHT: CAPACITIVE ===== -->
  <text x="300" y="40" fill="#00b4ff" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">Capacitive</text>
  <text x="300" y="52" fill="#00b4ff" font-family="monospace" font-size="8" text-anchor="middle">(Diaphragm)</text>
  
  <!-- Top fixed plate -->
  <line x1="240" y1="78" x2="360" y2="78" stroke="#e8edf5" stroke-width="2.5"/>
  <text x="370" y="81" fill="#e8edf5" font-family="monospace" font-size="6">fixed plate</text>
  
  <!-- Bottom fixed plate -->
  <line x1="240" y1="155" x2="360" y2="155" stroke="#e8edf5" stroke-width="2.5"/>
  <text x="370" y="158" fill="#e8edf5" font-family="monospace" font-size="6">fixed plate</text>
  
  <!-- Middle diaphragm (deflected upward by pressure) -->
  <path d="M 245 118 Q 300 90 355 118" fill="none" stroke="#F5A800" stroke-width="2"/>
  <text x="355" y="110" fill="#F5A800" font-family="monospace" font-size="6">diaphragm</text>
  
  <!-- Diaphragm at rest (dashed) -->
  <line x1="245" y1="118" x2="355" y2="118" stroke="#e8edf5" stroke-width="1" stroke-dasharray="4,3" opacity="0.35"/>
  
  <!-- Capacitance formula -->
  <text x="300" y="175" fill="#00b4ff" font-family="monospace" font-size="11" text-anchor="middle">C = εA / d</text>
  
  <!-- Labels pointing to A and d -->
  <line x1="240" y1="78" x2="240" y2="155" stroke="#00b4ff" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
  <text x="226" y="120" fill="#00b4ff" font-family="monospace" font-size="6" text-anchor="end" transform="rotate(-90,226,120)">d (gap)</text>
  
  <!-- A label -->
  <text x="250" y="73" fill="#e8edf5" font-family="monospace" font-size="6" opacity="0.6">← A →</text>
  
  <!-- Pressure arrow from below -->
  <polygon points="300,168 295,178 305,178" fill="#00b4ff"/>
  <line x1="300" y1="155" x2="300" y2="168" stroke="#00b4ff" stroke-width="1.5"/>
  <text x="315" y="175" fill="#00b4ff" font-family="monospace" font-size="7">P</text>
  
  <!-- Capacitance meter icon -->
  <text x="240" y="198" fill="#e8edf5" font-family="monospace" font-size="8" opacity="0.6">ΔC measured</text>
  
  <!-- Bottom label -->
  <text x="300" y="215" fill="#e8edf5" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.5">capacitance changes with diaphragm deflection</text>
  
  <!-- Note on right bottom -->
  <text x="300" y="235" fill="#e8edf5" font-family="monospace" font-size="6" text-anchor="middle" opacity="0.35">ε = permittivity, A = area, d = gap</text>
</svg>