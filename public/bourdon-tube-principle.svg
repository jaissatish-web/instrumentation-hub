<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#0f1a2d"/>
  
  <!-- Title -->
  <text x="200" y="24" fill="#e8edf5" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">BOURDON TUBE PRINCIPLE</text>
  
  <!-- ===== LEFT SIDE: AT REST ===== -->
  
  <!-- Divider -->
  <line x1="200" y1="30" x2="200" y2="235" stroke="#1a2d4a" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- Left label -->
  <text x="100" y="46" fill="#00b4ff" font-family="monospace" font-size="10" text-anchor="middle">At Rest</text>
  <text x="100" y="58" fill="#00b4ff" font-family="monospace" font-size="10" text-anchor="middle">(no pressure)</text>
  
  <!-- Bourdon tube at rest - curved shape (C-shape) -->
  <path d="M 40 200 Q 40 90 100 75 Q 160 60 160 140 Q 160 180 140 190" 
        fill="none" stroke="#00b4ff" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Elliptical cross-section indicator at top of tube (at rest) -->
  <!-- Small ellipse showing flattened cross section -->
  <ellipse cx="100" cy="75" rx="12" ry="5" fill="none" stroke="#F5A800" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="100" y="66" fill="#F5A800" font-family="monospace" font-size="7" text-anchor="middle">elliptical</text>
  <text x="100" y="94" fill="#F5A800" font-family="monospace" font-size="7" text-anchor="middle">cross-section</text>
  
  <!-- Connection block at base -->
  <rect x="28" y="195" width="30" height="20" rx="3" fill="none" stroke="#e8edf5" stroke-width="1.5"/>
  <text x="43" y="226" fill="#e8edf5" font-family="monospace" font-size="6" text-anchor="middle">PORT</text>
  
  <!-- No pressure arrow - small X or dash -->
  <text x="110" y="168" fill="#F5A800" font-family="monospace" font-size="14" text-anchor="middle">—</text>
  
  <!-- ===== RIGHT SIDE: UNDER PRESSURE ===== -->
  
  <!-- Right label -->
  <text x="300" y="46" fill="#F5A800" font-family="monospace" font-size="10" text-anchor="middle">Under</text>
  <text x="300" y="58" fill="#F5A800" font-family="monospace" font-size="10" text-anchor="middle">Pressure</text>
  
  <!-- Bourdon tube under pressure - straightened / uncoiled -->
  <path d="M 250 200 Q 250 110 300 95 Q 340 80 355 110 Q 370 140 355 170" 
        fill="none" stroke="#F5A800" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Rounded cross-section indicator at tip (under pressure) -->
  <circle cx="355" cy="170" r="8" fill="none" stroke="#00b4ff" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="355" y="192" fill="#00b4ff" font-family="monospace" font-size="7" text-anchor="middle">rounded</text>
  <text x="355" y="201" fill="#00b4ff" font-family="monospace" font-size="7" text-anchor="middle">cross-section</text>
  
  <!-- Connection block at base -->
  <rect x="238" y="195" width="30" height="20" rx="3" fill="none" stroke="#e8edf5" stroke-width="1.5"/>
  <text x="253" y="226" fill="#e8edf5" font-family="monospace" font-size="6" text-anchor="middle">PORT</text>
  
  <!-- Pressure arrows entering -->
  <polygon points="268,210 256,216 268,222" fill="#00b4ff" opacity="0.8"/>
  <polygon points="278,210 266,216 278,222" fill="#00b4ff" opacity="0.6"/>
  <polygon points="288,210 276,216 288,222" fill="#00b4ff" opacity="0.4"/>
  <text x="287" y="238" fill="#00b4ff" font-family="monospace" font-size="8" text-anchor="middle">P →</text>
  
  <!-- Motion arrow showing tip movement -->
  <line x1="155" y1="165" x2="235" y2="175" stroke="#e8edf5" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>
  <text x="195" y="162" fill="#e8edf5" font-family="monospace" font-size="7" text-anchor="middle">tip moves</text>
</svg>