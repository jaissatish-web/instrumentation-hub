<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2744" />
      <stop offset="100%" stop-color="#0f1a2d" />
    </linearGradient>
  </defs>
  
  <!-- Dial face -->
  <circle cx="150" cy="80" r="60" fill="#0f1a2d" stroke="#00b4ff" stroke-width="2" />
  <circle cx="150" cy="80" r="50" fill="#131d2e" />
  
  <!-- Scale markings -->
  <g stroke="#8a9bb5" stroke-width="1">
    <line x1="150" y1="30" x2="150" y2="38" />
    <line x1="190" y1="40" x2="185" y2="46" />
    <line x1="210" y1="60" x2="204" y2="63" />
    <line x1="210" y1="80" x2="202" y2="80" />
    <line x1="200" y1="105" x2="194" y2="100" />
    <line x1="170" y1="120" x2="168" y2="114" />
    <line x1="130" y1="120" x2="132" y2="114" />
    <line x1="100" y1="105" x2="106" y2="100" />
    <line x1="90" y1="80" x2="98" y2="80" />
    <line x1="100" y1="55" x2="106" y2="60" />
  </g>
  
  <!-- Temperature labels -->
  <text x="150" y="26" text-anchor="middle" fill="#e8edf5" font-size="8" font-family="monospace">°C</text>
  <text x="150" y="48" text-anchor="middle" fill="#e8edf5" font-size="6" font-family="monospace">0</text>
  <text x="198" y="64" text-anchor="middle" fill="#e8edf5" font-size="6" font-family="monospace">50</text>
  <text x="215" y="84" text-anchor="middle" fill="#e8edf5" font-size="6" font-family="monospace">100</text>
  <text x="195" y="108" text-anchor="middle" fill="#e8edf5" font-size="6" font-family="monospace">150</text>
  <text x="140" y="126" text-anchor="middle" fill="#e8edf5" font-size="6" font-family="monospace">200</text>
  
  <!-- Pointer -->
  <line x1="150" y1="80" x2="100" y2="60" stroke="#F5A800" stroke-width="2.5" />
  <circle cx="150" cy="80" r="4" fill="#F5A800" />
  
  <!-- Stem / sheath -->
  <rect x="140" y="140" width="20" height="120" rx="4" fill="url(#stemGrad)" stroke="#00b4ff" stroke-width="1" />
  
  <!-- Bimetallic coil indicator -->
  <rect x="142" y="240" width="16" height="30" rx="2" fill="#374151" />
  <path d="M145 245 Q150 255 155 245" stroke="#F5A800" stroke-width="1.5" fill="none" />
  <text x="150" y="270" text-anchor="middle" fill="#8a9bb5" font-size="6" font-family="monospace">Bimetal coil</text>
  
  <!-- Process connection -->
  <rect x="135" y="260" width="30" height="15" rx="2" fill="#374151" stroke="#00b4ff" stroke-width="1" />
  <text x="150" y="290" text-anchor="middle" fill="#8a9bb5" font-size="7" font-family="monospace">1/2 NPT</text>
  
  <text x="240" y="160" fill="#8a9bb5" font-size="7" font-family="monospace">Stainless steel sheath</text>
  <line x1="160" y1="160" x2="235" y2="160" stroke="#8a9bb5" stroke-width="0.5" />
</svg>